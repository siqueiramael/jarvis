<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F0A1E">
<title>Luma · Entrar</title>
<style>
  :root{--bg:#0F0A1E;--panel:#1A1230;--panel2:#241a40;--violet:#8B5CF6;--violet-soft:#a78bfa;--text:#E8E3F5;--muted:#9b91b8;--danger:#f87171;--border:#2e2350}
  *{box-sizing:border-box}html,body{height:100%}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -10%,#1b1138 0%,var(--bg) 60%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:380px;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:18px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
  .brand{text-align:center;margin-bottom:6px}
  .logo{font-weight:700;letter-spacing:.5em;font-size:22px;background:linear-gradient(90deg,var(--violet-soft),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent;padding-left:.5em}
  .sub{text-align:center;color:var(--muted);font-size:13px;margin:8px 0 26px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px 2px}
  .field{margin-bottom:16px}
  input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:#150e2a;color:var(--text);font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
  input:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(139,92,246,.25)}
  button{width:100%;margin-top:6px;padding:12px 14px;border:0;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;color:#fff;background:linear-gradient(90deg,var(--violet),#6d3df0);transition:filter .15s,transform .05s}
  button:hover{filter:brightness(1.08)}button:active{transform:translateY(1px)}button:disabled{opacity:.6;cursor:default}
  .msg{min-height:18px;margin-top:14px;font-size:13px;text-align:center;color:var(--danger)}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="logo">LUMA</span></div>
    <div class="sub">Entrar</div>
    <div class="field"><label for="u">Usuário</label><input id="u" type="text" autocomplete="username" autofocus></div>
    <div class="field"><label for="p">Senha</label><input id="p" type="password" autocomplete="current-password"></div>
    <button id="btn">Entrar</button>
    <div class="msg" id="msg"></div>
  </div>
<script>
  const u=document.getElementById('u'),p=document.getElementById('p'),btn=document.getElementById('btn'),msg=document.getElementById('msg');
  async function login(){
    msg.textContent='';btn.disabled=true;btn.textContent='Entrando...';
    try{
      const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u.value.trim(),password:p.value})});
      if(r.ok){window.location.href='/';return;}
      const d=await r.json().catch(()=>({}));msg.textContent=d.error||'Falha no login';
    }catch(e){msg.textContent='Erro de conexao';}
    btn.disabled=false;btn.textContent='Entrar';
  }
  btn.addEventListener('click',login);
  p.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  u.addEventListener('keydown',e=>{if(e.key==='Enter')p.focus();});
</script>
</body>
</html>
