<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F0A1E">
  <title>Luma</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="luma-layout">

  <!-- ═══ SIDEBAR / DRAWER ═══ -->
  <aside class="luma-sidebar" id="luma-drawer">
    <div class="sidebar-brand">
      <span class="sidebar-logo">L·U·M·A</span>
      <button class="sidebar-close-btn" id="drawer-close">✕</button>
    </div>

    <div class="sidebar-new-chat">
      <button class="new-chat-btn" id="new-chat-btn">
        <span class="new-chat-icon">+</span>
        <span>Nova conversa</span>
      </button>
    </div>
    <div class="sidebar-sessions" id="session-list">
      <div class="sessions-loading">Carregando...</div>
    </div>
    <div class="sidebar-footer">
      <button class="sidebar-footer-btn" id="sidebar-memory-btn" title="Memória">🧠 Memória</button>
      <button class="sidebar-footer-btn" id="sidebar-config-btn" title="Configurações">⚙️</button>
      <button class="sidebar-footer-btn" id="sidebar-admin-btn" title="Admin" style="display:none">🛡️ Admin</button>
      <button class="sidebar-footer-btn" id="sidebar-coder-btn" title="Coder" style="display:none">💻 Coder</button>
      <button class="sidebar-footer-btn" id="sidebar-logout-btn" title="Sair">🚪 Sair</button>
    </div>
  </aside>
  <script>
    (function(){
      var lo = document.getElementById('sidebar-logout-btn');
      if (lo) lo.addEventListener('click', async function(){
        try { await fetch('/api/logout', { method: 'POST' }); } catch(e){}
        window.location.href = '/login';
      });
      var ad = document.getElementById('sidebar-admin-btn');
      if (ad) ad.addEventListener('click', function(){ window.location.href = '/admin'; });
      var cd = document.getElementById('sidebar-coder-btn');
      if (cd) cd.addEventListener('click', function(){ window.location.href = '/coder'; });
      fetch('/api/me').then(function(r){ return r.ok ? r.json() : null; }).then(function(u){
        if (u && u.role === 'owner' && ad) ad.style.display = '';
        if (u && u.role === 'owner' && cd) cd.style.display = '';
      }).catch(function(){});
    })();
  </script>

  <!-- OVERLAY mobile -->
  <div class="drawer-overlay" id="drawer-overlay"></div>

  <!-- ═══ CONTENT ═══ -->
  <div class="luma-content">

    <header class="luma-header">
      <button class="menu-btn" id="menu-btn" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="2" y1="4" x2="16" y2="4"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="14" x2="16" y2="14"/>
        </svg>
      </button>
      <div class="header-brand">
        <span class="header-pulse"></span>
        <span class="header-logo">L·U·M·A</span>
      </div>
      <div class="header-agent-pill">
        <span id="current-agent-display">Orion</span>
      </div>
      <div class="header-agent-pill" id="model-pill" title="Modelo de resposta" style="opacity:0.6;">
        <span id="current-model-display">—</span>
      </div>
    </header>

    <main class="luma-main">
      <div id="chat-mini-output">
        <div class="luma-welcome">
          <div class="welcome-glyph">✦</div>
          <p>Olá! Eu sou a <strong>Luma</strong>.</p>
          <p class="welcome-sub">Como posso ajudar?</p>
        </div>
      </div>
    </main>

    <div class="luma-attach-bar" id="luma-attach-chips"></div>
    <footer class="luma-footer">
      <button class="attach-btn-luma" id="luma-attach-btn" title="Anexar documento" type="button">📎</button>
      <input type="file" id="luma-attach-input" accept=".txt,.md,.pdf,.docx,.xml,.csv,.json" style="display:none"/>
      <button class="mic-btn" id="mic-btn" title="Falar com Luma">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <input class="msg-input" id="chat-mini-input" type="text"
             placeholder="Mensagem para Luma..." autocomplete="off" enterkeyhint="send" />
      <button class="send-btn-luma" id="chat-mini-send" title="Enviar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </footer>

  </div><!-- .luma-content -->
</div><!-- .luma-layout -->

<!-- IDs legados (necessários pelo script.js) -->
<div id="__legacy__" aria-hidden="true" style="display:none;position:absolute;pointer-events:none;width:0;height:0;overflow:hidden;">
  <div id="clock"></div><div id="date-day"></div><div id="date-full"></div><div id="date-time"></div>
  <div id="cpu-temp"></div><div id="cpu-usage"></div><div id="cpu-cores"></div>
  <div id="gpu-temp"></div><div id="gpu-status"></div><div id="ram-value"></div><div id="ram-detail"></div>
  <div id="weather-city"></div><div id="weather-temp"></div><div id="weather-desc"></div>
  <div id="metric-uptime"></div><div id="metric-tasks"></div><div id="metric-voice"></div><div id="metric-activity"></div>
  <div id="stat-latency"></div><div id="stat-plan"></div><div id="stat-pool"></div>
  <div id="stat-requests"></div><div id="stat-session"></div><div id="stat-tokens"></div>
  <div id="model-opus"></div><div id="model-sonnet"></div><div id="model-haiku"></div>
  <div id="model-status"></div><div id="active-model"></div><div id="agents-list"></div>
  <div id="particle-orb"></div><div id="avatar-status"></div><div id="boot-msg"></div>
  <div id="bar-api"></div><div id="bar-claude"></div><div id="bar-voice"></div>
  <input id="chat-input" type="text"/><button id="send-btn"></button>
  <button id="screen-btn"></button><div id="screen-preview-box"></div>
  <button id="continuous-btn"></button><button id="realtime-btn"></button>
  <button id="btn-brain"></button><button id="btn-ingest"></button>
  <div id="brain-modal"></div><button id="brain-close"></button><button id="brain-maximize"></button>
  <div id="brain-preview"></div><input id="brain-search" type="text"/><div id="brain-tree"></div>
  <div id="obs-folders"></div><div id="obs-links"></div><div id="obsidian-notes"></div><div id="obsidian-status"></div>
  <div id="att-preview"></div><input id="file-attach" type="file"/><div id="file-list"></div>
  <div id="ingest-modal"></div><button id="ingest-close"></button><button id="ingest-cancel"></button>
  <button id="ingest-submit"></button><div id="ingest-dropzone"></div>
  <input id="ingest-file-input" type="file"/><div id="ingest-file-name"></div>
  <div id="ingest-status"></div><input id="ingest-text-input" type="text"/>
  <select id="ingest-text-category"></select><input id="config-api-key" type="text"/>
  <button id="save-api-key"></button><select id="config-tts-voice"></select>
  <input id="config-voice" type="text"/><input id="config-wakeword" type="text"/>
  <div id="conclave-checkbox"></div><div id="terminal-output"></div>
  <div id="preflight-overlay"></div><div id="preflight-msg"></div><div id="preflight-result"></div>
  <button id="preflight-ok"></button><button id="preflight-retry"></button>
  <button id="preflight-autofix"></button><div id="preflight-fixlog"></div>
  <button id="btn-launch-pet"></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
<script src="script.js"></script>
<script src="luma.js"></script>
<style>
  .luma-attach-bar { display:flex; flex-wrap:wrap; gap:6px; padding:6px 14px 0; }
  .luma-attach-bar:empty { display:none; }
  .att-chip { display:inline-flex; align-items:center; gap:6px; background:rgba(139,92,246,0.15); border:1px solid rgba(139,92,246,0.4); color:#c4b5fd; border-radius:14px; padding:3px 10px; font-size:12px; max-width:220px; }
  .att-chip .att-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .att-chip .att-x { cursor:pointer; background:none; border:none; color:#c4b5fd; font-size:13px; line-height:1; padding:0; }
  .att-chip .att-x:hover { color:#fff; }
  .attach-btn-luma { background:none; border:none; cursor:pointer; font-size:18px; opacity:0.7; padding:0 4px; }
  .attach-btn-luma:hover { opacity:1; }
</style>
<script>
(function(){
  var chips = document.getElementById('luma-attach-chips');
  var btn = document.getElementById('luma-attach-btn');
  var input = document.getElementById('luma-attach-input');
  if (!chips || !btn || !input) return;
  function render(docs){
    chips.innerHTML = '';
    (docs||[]).forEach(function(d){
      var c = document.createElement('div'); c.className = 'att-chip';
      var n = document.createElement('span'); n.className = 'att-name'; n.textContent = '📄 ' + d.name; c.appendChild(n);
      var x = document.createElement('button'); x.className = 'att-x'; x.textContent = '✕';
      x.addEventListener('click', function(){ detach(d.name); });
      c.appendChild(x); chips.appendChild(c);
    });
  }
  function load(){
    fetch('/api/docs/attached').then(function(r){ return r.ok ? r.json() : {docs:[]}; })
      .then(function(j){ render(j.docs); }).catch(function(){});
  }
  function detach(name){
    fetch('/api/docs/detach', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name:name}) })
      .then(function(r){ return r.json(); }).then(function(j){ render(j.docs); }).catch(function(){});
  }
  btn.addEventListener('click', function(){ input.click(); });
  input.addEventListener('change', function(){
    var fl = input.files && input.files[0]; if (!fl) return;
    var fd = new FormData(); fd.append('file', fl);
    btn.textContent = '⏳';
    fetch('/api/docs/upload', { method:'POST', body: fd })
      .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, j:j }; }); })
      .then(function(res){
        btn.textContent = '📎'; input.value='';
        if (!res.ok) { alert('Falha no upload: ' + (res.j.error||'erro')); return; }
        render(res.j.attached || []);
      })
      .catch(function(e){ btn.textContent='📎'; input.value=''; alert('Erro: '+e.message); });
  });
  load();
})();
</script>
</body>
</html>
