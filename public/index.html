<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F0A1E">
  <title>Luma</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="luma-layout">

  <!-- ═══ SIDEBAR / DRAWER ═══ -->
  <aside class="luma-sidebar" id="luma-drawer">
    <div class="sidebar-brand">
      <span class="sidebar-logo">L·U·M·A</span>
      <button class="sidebar-close-btn" id="drawer-close">✕</button>
    </div>

    <section class="sidebar-section">
      <div class="section-title">Sistema</div>
      <div class="status-item"><span class="status-dot-sm" id="bar-api-status"></span><span>VPS / API</span></div>
      <div class="status-item"><span class="status-dot-sm" id="bar-claude-status"></span><span>LM Studio</span></div>
      <div class="status-item"><span class="status-dot-sm" id="bar-voice-status"></span><span>Whisper STT</span></div>
      <div class="status-item"><span class="status-dot-sm" id="obsidian-status-dot"></span><span>Obsidian Vault</span></div>
    </section>

    <section class="sidebar-section">
      <div class="section-title">Agentes</div>
      <div class="agents-list">
        <div class="aiox-agent" data-entity="aios-master"><span class="aiox-dot online"></span><span class="aiox-name">Orion</span><span class="aiox-role">Master</span></div>
        <div class="aiox-agent" data-entity="architect"><span class="aiox-dot online"></span><span class="aiox-name">Aria</span><span class="aiox-role">Architect</span></div>
        <div class="aiox-agent" data-entity="dev"><span class="aiox-dot online"></span><span class="aiox-name">Dex</span><span class="aiox-role">Dev</span></div>
        <div class="aiox-agent" data-entity="data-engineer"><span class="aiox-dot online"></span><span class="aiox-name">Dara</span><span class="aiox-role">Data</span></div>
        <div class="aiox-agent" data-entity="devops"><span class="aiox-dot online"></span><span class="aiox-name">Gage</span><span class="aiox-role">DevOps</span></div>
        <div class="aiox-agent" data-entity="ux"><span class="aiox-dot online"></span><span class="aiox-name">Uma</span><span class="aiox-role">UX</span></div>
        <div class="aiox-agent" data-entity="pm"><span class="aiox-dot online"></span><span class="aiox-name">Morgan</span><span class="aiox-role">PM</span></div>
        <div class="aiox-agent" data-entity="po"><span class="aiox-dot online"></span><span class="aiox-name">Pax</span><span class="aiox-role">PO</span></div>
        <div class="aiox-agent" data-entity="analyst"><span class="aiox-dot online"></span><span class="aiox-name">Atlas</span><span class="aiox-role">Analyst</span></div>
        <div class="aiox-agent" data-entity="qa"><span class="aiox-dot online"></span><span class="aiox-name">Quinn</span><span class="aiox-role">QA</span></div>
        <div class="aiox-agent" data-entity="sm"><span class="aiox-dot online"></span><span class="aiox-name">River</span><span class="aiox-role">SM</span></div>
        <div class="aiox-agent" data-entity="squad-creator"><span class="aiox-dot online"></span><span class="aiox-name">Craft</span><span class="aiox-role">Squad</span></div>
      </div>
    </section>

    <section class="sidebar-section">
      <div class="section-title">Idioma</div>
      <div class="lang-btns">
        <button class="lang-btn active" id="lang-br">PT</button>
        <button class="lang-btn" id="lang-en">EN</button>
        <button class="lang-btn" id="lang-es">ES</button>
      </div>
    </section>
  </aside>

  <!-- OVERLAY mobile -->
  <div class="drawer-overlay" id="drawer-overlay"></div>

  <!-- ═══ CONTENT ═══ -->
  <div class="luma-content">

    <header class="luma-header">
      <button class="menu-btn" id="menu-btn" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="2" y1="4" x2="16" y2="4"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="14" x2="16" y2="14"/>
        </svg>
      </button>
      <div class="header-brand">
        <span class="header-pulse"></span>
        <span class="header-logo">L·U·M·A</span>
      </div>
      <div class="header-agent-pill">
        <span id="current-agent-display">Orion</span>
      </div>
    </header>

    <main class="luma-main">
      <div id="chat-mini-output">
        <div class="luma-welcome">
          <div class="welcome-glyph">✦</div>
          <p>Olá! Eu sou a <strong>Luma</strong>.</p>
          <p class="welcome-sub">Como posso ajudar?</p>
        </div>
      </div>
    </main>

    <footer class="luma-footer">
      <button class="mic-btn" id="mic-btn" title="Falar com Luma">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <input class="msg-input" id="chat-mini-input" type="text"
             placeholder="Mensagem para Luma..." autocomplete="off" enterkeyhint="send" />
      <button class="send-btn-luma" id="chat-mini-send" title="Enviar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </footer>

  </div><!-- .luma-content -->
</div><!-- .luma-layout -->

<!-- IDs legados (necessários pelo script.js) -->
<div id="__legacy__" aria-hidden="true" style="display:none;position:absolute;pointer-events:none;width:0;height:0;overflow:hidden;">
  <div id="clock"></div><div id="date-day"></div><div id="date-full"></div><div id="date-time"></div>
  <div id="cpu-temp"></div><div id="cpu-usage"></div><div id="cpu-cores"></div>
  <div id="gpu-temp"></div><div id="gpu-status"></div><div id="ram-value"></div><div id="ram-detail"></div>
  <div id="weather-city"></div><div id="weather-temp"></div><div id="weather-desc"></div>
  <div id="metric-uptime"></div><div id="metric-tasks"></div><div id="metric-voice"></div><div id="metric-activity"></div>
  <div id="stat-latency"></div><div id="stat-plan"></div><div id="stat-pool"></div>
  <div id="stat-requests"></div><div id="stat-session"></div><div id="stat-tokens"></div>
  <div id="model-opus"></div><div id="model-sonnet"></div><div id="model-haiku"></div>
  <div id="model-status"></div><div id="active-model"></div><div id="agents-list"></div>
  <div id="particle-orb"></div><div id="avatar-status"></div><div id="boot-msg"></div>
  <div id="bar-api"></div><div id="bar-claude"></div><div id="bar-voice"></div>
  <input id="chat-input" type="text"/><button id="send-btn"></button>
  <button id="screen-btn"></button><div id="screen-preview-box"></div>
  <button id="continuous-btn"></button><button id="realtime-btn"></button>
  <button id="btn-brain"></button><button id="btn-ingest"></button>
  <div id="brain-modal"></div><button id="brain-close"></button><button id="brain-maximize"></button>
  <div id="brain-preview"></div><input id="brain-search" type="text"/><div id="brain-tree"></div>
  <div id="obs-folders"></div><div id="obs-links"></div><div id="obsidian-notes"></div><div id="obsidian-status"></div>
  <div id="att-preview"></div><input id="file-attach" type="file"/><div id="file-list"></div>
  <div id="ingest-modal"></div><button id="ingest-close"></button><button id="ingest-cancel"></button>
  <button id="ingest-submit"></button><div id="ingest-dropzone"></div>
  <input id="ingest-file-input" type="file"/><div id="ingest-file-name"></div>
  <div id="ingest-status"></div><input id="ingest-text-input" type="text"/>
  <select id="ingest-text-category"></select><input id="config-api-key" type="text"/>
  <button id="save-api-key"></button><select id="config-tts-voice"></select>
  <input id="config-voice" type="text"/><input id="config-wakeword" type="text"/>
  <div id="conclave-checkbox"></div><div id="terminal-output"></div>
  <div id="preflight-overlay"></div><div id="preflight-msg"></div><div id="preflight-result"></div>
  <button id="preflight-ok"></button><button id="preflight-retry"></button>
  <button id="preflight-autofix"></button><div id="preflight-fixlog"></div>
  <button id="btn-launch-pet"></button>
</div>

<script src="script.js"></script>
<script src="luma.js"></script>
</body>
</html>
