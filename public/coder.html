<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Luma · Coder</title>
<style>
  :root { --bg:#0F0A1E; --panel:#1a1430; --panel2:#221a3d; --violet:#8b5cf6; --violet2:#a78bfa; --text:#e9e4f5; --muted:#9d93b8; --border:#2d2547; --ok:#34d399; --err:#f87171; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; height:100vh; display:flex; flex-direction:column; }
  header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); }
  .logo { font-weight:700; letter-spacing:3px; color:var(--violet2); }
  .logo span { color:var(--muted); font-weight:400; letter-spacing:0; margin-left:10px; }
  header a { color:var(--violet2); text-decoration:none; margin-left:18px; font-size:14px; cursor:pointer; }
  .wrap { flex:1; display:flex; min-height:0; }
  .sidebar { width:260px; border-right:1px solid var(--border); padding:14px; overflow:auto; }
  .sidebar h3 { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:0 0 10px; display:flex; justify-content:space-between; align-items:center; }
  .tree { font-size:13px; }
  .tree .dir { color:var(--violet2); font-weight:600; padding:3px 0; }
  .tree .file { color:var(--text); padding:3px 0; cursor:pointer; border-radius:4px; }
  .tree .file:hover { background:var(--panel2); }
  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  .taskbar { padding:14px; border-bottom:1px solid var(--border); display:flex; gap:10px; }
  .taskbar textarea { flex:1; background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px; font-family:inherit; font-size:14px; resize:vertical; min-height:46px; }
  button.run { background:var(--violet); color:#fff; border:none; border-radius:8px; padding:0 22px; font-weight:600; cursor:pointer; }
  button.run:disabled { opacity:.5; cursor:default; }
  .log { flex:1; overflow:auto; padding:16px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:10px; }
  .card .tool { color:var(--violet2); font-weight:600; font-size:13px; }
  .card .args { color:var(--muted); font-size:12px; margin-top:4px; font-family:ui-monospace,monospace; }
  .card pre { background:var(--bg); border-radius:8px; padding:10px; margin:8px 0 0; overflow:auto; font-size:12.5px; white-space:pre-wrap; }
  .reply { background:var(--panel2); border:1px solid var(--violet); border-radius:10px; padding:14px 16px; white-space:pre-wrap; }
  .badge { font-size:11px; padding:2px 8px; border-radius:20px; }
  .b-ok { background:rgba(52,211,153,.15); color:var(--ok); }
  .b-err { background:rgba(248,113,113,.15); color:var(--err); }
  .meta { color:var(--muted); font-size:12px; margin-bottom:14px; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:10; }
  .modal { background:var(--panel); border:1px solid var(--border); border-radius:12px; width:80%; max-width:900px; max-height:80vh; display:flex; flex-direction:column; }
  .modal header { border-bottom:1px solid var(--border); }
  .modal pre { margin:0; padding:16px; overflow:auto; font-size:13px; white-space:pre; }
</style>
</head>
<body>
<header>
  <div class="logo">L·U·M·A <span>Coder</span></div>
  <div><a href="/">← App</a><a id="logout">Sair</a></div>
</header>
<div class="wrap">
  <div class="sidebar">
    <h3>Workspace <a id="refresh" style="margin:0;font-size:13px;">↻</a></h3>
    <div class="tree" id="tree"></div>
  </div>
  <div class="main">
    <div class="taskbar">
      <textarea id="task" placeholder="Descreva a tarefa de código... (Ctrl+Enter pra rodar)"></textarea>
      <button class="run" id="run">Rodar</button>
    </div>
    <div class="log" id="log"></div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <header><div id="viewer-name" class="logo" style="letter-spacing:0;font-size:14px;"></div><a id="viewer-close">fechar</a></header>
    <pre id="viewer-content"></pre>
  </div>
</div>
<script>
  const $ = id => document.getElementById(id);
  function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  async function loadTree(){
    try {
      const r = await fetch('/api/coder/tree'); const d = await r.json();
      $('tree').innerHTML = ''; renderTree(d.tree||[], $('tree'), 0);
      if(!(d.tree||[]).length) $('tree').innerHTML = '<div class="meta">(workspace vazio)</div>';
    } catch(e){ $('tree').textContent = 'erro ao carregar'; }
  }
  function renderTree(nodes, container, depth){
    for(const n of nodes){
      const el = document.createElement('div');
      el.className = (n.type==='dir'?'dir':'file');
      if(depth) el.style.paddingLeft = (depth*14)+'px';
      el.textContent = (n.type==='dir'?'📁 ':'📄 ') + n.name;
      container.appendChild(el);
      if(n.type==='dir' && n.children) renderTree(n.children, container, depth+1);
      else if(n.type==='file') el.onclick = ()=>openFile(n.path);
    }
  }
  async function openFile(path){
    try {
      const r = await fetch('/api/coder/file?path='+encodeURIComponent(path)); const d = await r.json();
      $('viewer-content').textContent = r.ok ? d.content : (d.error||'erro');
      $('viewer-name').textContent = path; $('overlay').style.display = 'flex';
    } catch(e){}
  }
  $('viewer-close').onclick = ()=>{ $('overlay').style.display='none'; };
  $('overlay').onclick = (e)=>{ if(e.target===$('overlay')) $('overlay').style.display='none'; };
  let running = false;
  function addCard(html){ const c=document.createElement('div'); c.className='card'; c.innerHTML=html; $('log').appendChild(c); $('log').scrollTop=$('log').scrollHeight; return c; }
  function handleEvent(event, p, steps){
    if(event==='meta'){
      const m=document.createElement('div'); m.className='meta';
      m.textContent='modelo: '+p.model+' · tools: '+(p.tools||[]).join(', ')+' · max '+p.maxSteps+' passos';
      $('log').appendChild(m);
    } else if(event==='step'){
      steps[p.tool+'#'+p.n] = addCard('<div class="tool">🔧 '+esc(p.tool)+'</div><div class="args">'+esc(JSON.stringify(p.args))+'</div>');
    } else if(event==='tool_result'){
      const c=steps[p.tool+'#'+p.n];
      const badge=p.ok?'<span class="badge b-ok">ok</span>':'<span class="badge b-err">erro</span>';
      const pre='<pre>'+esc(p.result)+'</pre>';
      if(c) c.innerHTML += '<div style="margin-top:8px;">'+badge+'</div>'+pre; else addCard(badge+pre);
      $('log').scrollTop=$('log').scrollHeight;
    } else if(event==='done'){
      const r=document.createElement('div'); r.className='reply'; r.textContent=p.reply||'(sem resposta)'; $('log').appendChild(r);
      const m=document.createElement('div'); m.className='meta'; m.style.marginTop='8px'; m.textContent='✓ concluído em '+p.steps+' passo(s)'; $('log').appendChild(m);
      $('log').scrollTop=$('log').scrollHeight;
    } else if(event==='error'){ addCard('<span class="badge b-err">erro</span> '+esc(p.error)); }
  }
  async function runTask(){
    const task=$('task').value.trim(); if(!task||running) return;
    running=true; $('run').disabled=true; $('log').innerHTML=''; const steps={};
    try {
      const resp=await fetch('/api/coder/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task})});
      const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf='';
      while(true){
        const {done,value}=await reader.read(); if(done) break;
        buf+=dec.decode(value,{stream:true}); const parts=buf.split('\n\n'); buf=parts.pop();
        for(const ev of parts){
          let event='message',data='';
          for(const line of ev.split('\n')){
            if(line.startsWith('event:')) event=line.slice(6).trim();
            else if(line.startsWith('data:')) data+=line.slice(5).trim();
          }
          let payload={}; try{ payload=JSON.parse(data); }catch(e){}
          handleEvent(event,payload,steps);
        }
      }
    } catch(e){ addCard('<span class="badge b-err">erro</span> '+esc(e.message)); }
    running=false; $('run').disabled=false; loadTree();
  }
  $('run').onclick=runTask;
  $('task').addEventListener('keydown', e=>{ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); runTask(); } });
  $('refresh').onclick=(e)=>{ e.stopPropagation(); loadTree(); };
  $('logout').onclick=async ()=>{ try{await fetch('/api/logout',{method:'POST'});}catch(e){} location.href='/login'; };
  loadTree();
</script>
</body>
</html>
