<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS Chat Simples</title>
  <style>
    body {
      background: #0a0e27;
      color: #00e4ff;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: #1a1f3a;
      border: 2px solid #00e4ff;
      border-radius: 10px;
      width: 100%;
      max-width: 600px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0, 228, 255, 0.3);
    }
    h1 {
      text-align: center;
      color: #ffd700;
      margin-top: 0;
    }
    #messages {
      background: #0a0e27;
      border: 1px solid #00e4ff;
      border-radius: 5px;
      padding: 15px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 15px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 3px;
    }
    .user {
      background: rgba(0, 228, 255, 0.1);
      color: #00e4ff;
      text-align: right;
    }
    .assistant {
      background: rgba(255, 215, 0, 0.1);
      color: #ffd700;
    }
    .input-group {
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 10px;
      background: #0a0e27;
      border: 1px solid #00e4ff;
      border-radius: 5px;
      color: #00e4ff;
      font-family: 'Courier New', monospace;
    }
    button {
      padding: 10px 20px;
      background: #00e4ff;
      border: none;
      border-radius: 5px;
      color: #0a0e27;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #ffd700;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .loading {
      color: #ffd700;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ JARVIS Chat</h1>
    <div id="messages"></div>
    <div class="input-group">
      <input id="input" type="text" placeholder="Digita algo..." />
      <button id="send">Enviar</button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, isUser) {
      const msg = document.createElement('div');
      msg.className = 'message ' + (isUser ? 'user' : 'assistant');
      msg.textContent = text;
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';
      sendBtn.disabled = true;

      const loadingMsg = document.createElement('div');
      loadingMsg.className = 'message loading';
      loadingMsg.textContent = '⏳ Pensando...';
      messagesDiv.appendChild(loadingMsg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();
        
        messagesDiv.removeChild(loadingMsg);
        
        // Tentar diferentes formatos de resposta
        const reply = data.reply || data.message || data.response || JSON.stringify(data);
        addMessage(reply, false);
      } catch (err) {
        messagesDiv.removeChild(loadingMsg);
        addMessage(`❌ Erro: ${err.message}`, false);
      }

      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
    });

    addMessage('Olá! Sou o JARVIS. Como posso ajudar?', false);
    input.focus();
  </script>
</body>
</html>
