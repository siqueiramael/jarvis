services:
  jarvis-api:
    build: .
    container_name: jarvis-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      LM_STUDIO_MODEL: ${LM_STUDIO_MODEL}
      OBSIDIAN_VAULT: /app/data/obsidian-vault
      GIT_REPO: https://github.com/siqueiramael/jarvis-brain.git
      GIT_BRANCH: master
      TAILSCALE_VPS_IP: 100.114.78.91
      TAILSCALE_WINDOWS_IP: 100.112.73.46
    volumes:
      - ./data/obsidian-vault:/app/data/obsidian-vault
      - ./logs:/app/logs
    networks:
      - jarvis-network

  obsidian-sync:
    image: alpine:latest
    container_name: jarvis-obsidian-sync
    restart: unless-stopped
    volumes:
      - ./data/obsidian-vault:/vault
    environment:
      GIT_REPO: https://github.com/siqueiramael/jarvis-brain.git
      GIT_BRANCH: master
    networks:
      - jarvis-network
    command: sh -c "apk add --no-cache git ca-certificates && cd /vault && test -d .git || git clone -b $$GIT_BRANCH $$GIT_REPO . && while true; do sleep 300; cd /vault && git pull origin $$GIT_BRANCH 2>/dev/null || true; done"

networks:
  jarvis-network:
    driver: bridge
